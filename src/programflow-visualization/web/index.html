<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 style-src {{CSP_SOURCE}} 'unsafe-inline';
                 script-src 'nonce-{{NONCE}}' {{CSP_SOURCE}};
                 img-src {{CSP_SOURCE}} data:;
                 connect-src {{CSP_SOURCE}};
                 font-src {{CSP_SOURCE}};" />

  <link rel="stylesheet" href="{{WEBVIEW_CSS}}" />
  <title>Code Visualization</title>
</head>

<body>
  <div class="column scrollable" id="viz">
    <div class="row">
      <div class="column floating-left">
        <div class="row title">Frames</div>
        <div class="divider"></div>
      </div>
      <div class="column floating-right">
        <div class="row title">Objects</div>
        <div class="divider"></div>
      </div>
    </div>

    <div class="row">
      <div class="column floating-left floating-left-content" id="frames"></div>
      <div class="column floating-right floating-right-content" id="objects"></div>
    </div>
  </div>

  <div class="row" id="bottom-area">
    <div class="column floating-left">
      <div class="slidecontainer">
        <input
          type="range"
          min="0"
          max="0"
          value="0"
          class="slider"
          id="traceSlider"
        />
      </div>

      <div class="row margin-vertical">
        <p>Step&nbsp;</p>
        <p id="indexCounter">0</p>
        <p id="traceMax">/?</p>
      </div>

      <div class="row margin-vertical">
        <button class="margin-horizontal" id="firstButton" type="button">&#9198</button>
        <button class="margin-horizontal" id="prevButton" type="button">&#9664</button>
        <button class="margin-horizontal" id="nextButton" type="button">&#9654</button>
        <button class="margin-horizontal" id="lastButton" type="button">&#9197</button>
      </div>
    </div>

    <div class="column floating-right">
      <pre class="scrollable" id="stdout-log"></pre>
    </div>
  </div>

  <!-- scripts -->
  <!-- example trace for web-dev -->
  <script nonce="{{NONCE}}" src="./example-trace-content.js"></script>

  <script nonce="{{NONCE}}" src="{{VSCODE_HOST_ADAPTER_JS}}"></script>

  <script nonce="{{NONCE}}" src="{{WEBVIEW_JS}}"></script>

</body>
</html>
